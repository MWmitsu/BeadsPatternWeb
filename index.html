<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#2b8a78" />
    <meta name="description" content="画像から色を自動で判定して、アイロンビーズの図案に変換するツールです。画像はインターネットに送らず、お使いの端末の中だけで処理します。" />
    <title>アイロンビーズ図案メーカー</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="root" class="app-root"></div>
    <noscript>このアプリの利用には JavaScript を有効にしてください。</noscript>

    <!-- ライブラリ(ローカル同梱・UMD)。順序重要: htm は React の後 -->
    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="vendor/htm.umd.js"></script>

    <!-- アプリ本体(ES Modules)。module は defer 相当なので上記UMD読込後に実行される -->
    <script type="module" src="js/main.js"></script>

    <!-- PWA: Service Worker 登録(http(s)/localhost のみ有効。file:// では無効) -->
    <script>
      if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function () {});
        });
      }
    </script>
  </body>
</html>
